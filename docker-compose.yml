services:
  build:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry

  test:
    build:
      context: .
      target: test
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    command: cargo test

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cargo-cache:
